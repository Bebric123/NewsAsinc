<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ — отправка новостей</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/admin.css" />
</head>
<body>

<header>
  <h1>Панель администратора</h1>
  <a href="/" class="nav-link">← Лента</a>
</header>

<main>
  <form id="news-form" novalidate>
    <div class="field">
      <label for="title">Заголовок</label>
      <input id="title" type="text" placeholder="Введите заголовок новости" autocomplete="off" />
    </div>

    <div class="field">
      <label for="body">Текст <span class="required">*</span></label>
      <textarea id="body" rows="5" placeholder="Введите текст новости…" required></textarea>
      <span class="field-error" id="body-error">Поле обязательно для заполнения</span>
    </div>

    <div class="form-footer">
      <button type="submit" id="submit-btn">Отправить новость</button>
      <span id="send-status"></span>
    </div>
  </form>

  <section class="history">
    <h2>Последние отправленные</h2>
    <ul id="history-list">
      <li class="history-empty">Ещё ничего не отправлено</li>
    </ul>
  </section>
</main>

<script src="/static/admin.js"></script>

</body>
</html>
